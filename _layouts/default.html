<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        /* 针对你要求的不同身份标签颜色 */
        .badge-indigo { background-color: #e0e7ff; color: #4338ca; border: 1px solid #c7d2fe; }
        .badge-purple { background-color: #f3e8ff; color: #7e22ce; border: 1px solid #e9d5ff; }
        .badge-blue { background-color: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .badge-cyan { background-color: #ecfeff; color: #0891b2; border: 1px solid #cffafe; }
        .badge-green { background-color: #f0fdf4; color: #15803d; border: 1px solid #dcfce7; }
        .badge-orange { background-color: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
        .badge-gray { background-color: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed">

    <nav class="glass-nav sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="text-xl font-bold tracking-tight text-blue-600">
                        {{ site.title }} <span class="text-slate-400 font-light ml-2">Lab</span>
                    </a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8 text-sm font-medium">
                        <a href="/" class="text-slate-600 hover:text-blue-600 transition">首页</a>
                        <a href="/research" class="text-slate-600 hover:text-blue-600 transition">研究方向</a>
                        <a href="/people" class="text-slate-600 hover:text-blue-600 transition">团队成员</a>
                        <a href="/publications" class="text-slate-600 hover:text-blue-600 transition">学术成果</a>
                        <a href="/news" class="text-slate-600 hover:text-blue-600 transition">新闻动态</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="bg-white border-t border-slate-200 mt-20 py-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-slate-500 text-sm">
                &copy; 2024-2026 {{ site.title }}. Built by {{ site.author }}.
            </p>
            <p class="text-slate-400 text-xs mt-2">
                同济大学 · 云计算、大数据、AI、区块链与物联网实验室
            </p>
        </div>
    </footer>

</body>
</html>
