research:
  - icon: "🛰️"
    title:
      zh: "空间智能与三维场景地图"
      en: "Spatial Intelligence and 3D Scene Mapping"
    description:
      zh: "围绕大尺度空间感知、语义地图构建和真实场景表示学习展开研究，目标是让智能体拥有可共享、可推理、可持续更新的环境记忆。"
      en: "We study large-scale spatial perception, semantic map construction, and scene representation learning so agents can build shared, queryable, and continuously updated memories of the world."
    points:
      zh:
        - "多层级三维场景表示与语义压缩"
        - "跨设备空间地图对齐与共享"
        - "开放环境中的鲁棒重定位"
        - "稀疏观测下的场景补全"
        - "具备时序记忆的地图更新策略"
      en:
        - "Multi-level 3D representations with semantic compression"
        - "Cross-device spatial map alignment and sharing"
        - "Robust relocalization in open environments"
        - "Scene completion under sparse observations"
        - "Map update policies with temporal memory"
    image: "/assets/images/research/spatial-fabric.svg"

  - icon: "🤖"
    title:
      zh: "具身规划与世界模型"
      en: "Embodied Planning and World Models"
    description:
      zh: "关注机器人如何在有限观察、开放目标和长任务链条件下进行推理、规划和自我纠错，强调世界模型与动作决策之间的闭环。"
      en: "This direction focuses on reasoning, planning, and self-correction for embodied systems under partial observations, open goals, and long task chains, with an emphasis on closing the loop between world models and action."
    points:
      zh:
        - "长时程任务分解与子目标生成"
        - "基于文本和示教的混合规划"
        - "多智能体协作中的状态共享"
        - "失败恢复与自我反思机制"
      en:
        - "Long-horizon task decomposition and subgoal generation"
        - "Hybrid planning from language and demonstrations"
        - "State sharing in multi-agent collaboration"
        - "Failure recovery and self-reflection loops"
    image: "/assets/images/research/agent-arena.svg"

  - icon: "🎛️"
    title:
      zh: "设计智能与生成式交互"
      en: "Design Intelligence and Generative Interaction"
    description:
      zh: "探索面向设计、创作和知识整理的生成式工具链，把模型能力转化为结构清晰、反馈即时且可被团队协作消费的交互系统。"
      en: "We explore generative toolchains for design, creation, and knowledge work, converting model capability into interaction systems that are structured, responsive, and truly collaborative."
    points:
      zh:
        - "可控生成式界面组件"
        - "研究流程中的协作式内容生成"
      en:
        - "Controllable generative interface components"
        - "Collaborative content generation for research workflows"
    image: "/assets/images/research/design-intelligence.svg"

  - icon: "🦿"
    title:
      zh: "动态环境中的机器人控制"
      en: "Robot Control in Dynamic Environments"
    description:
      zh: "面向室内服务、园区巡检和半结构化工作现场，研究兼顾安全性、恢复能力和实时性的运动控制与任务执行策略。"
      en: "Targeting indoor service, campus inspection, and semi-structured work sites, we study control and execution strategies that balance safety, recovery, and real-time performance."
    points:
      zh:
        - "复杂地形下的移动控制"
        - "视觉伺服与接触感知融合"
        - "动作失败后的快速重规划"
        - "多机器人任务编队"
        - "现场运行状态监控"
      en:
        - "Mobility control on challenging terrain"
        - "Fusion of visual servoing and contact sensing"
        - "Fast replanning after action failures"
        - "Multi-robot task formation"
        - "Runtime state monitoring in the field"
    image: "/assets/images/research/robotics-field.svg"

