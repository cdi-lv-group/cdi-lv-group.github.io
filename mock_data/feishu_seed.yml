      zh: "开放世界识别与长尾学习"
      en: "Open-World Recognition and Long-Tail Learning"
    description:
      zh: "研究模型如何在类别不断扩展、分布持续漂移的环境中保持识别能力与校准能力，重点关注未知类发现和知识迁移。"
      en: "We study how models retain recognition quality and calibration as categories expand and distributions drift, with a focus on unknown discovery and knowledge transfer."
