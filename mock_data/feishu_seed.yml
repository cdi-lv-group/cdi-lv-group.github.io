publications:
  - title:
      zh: "AtlasBench：面向长时程空间智能体的结构化评测基准"
      en: "AtlasBench: A Structured Evaluation Benchmark for Long-Horizon Spatial Agents"
    authors: "<b>Junhao Shen</b>, Olivia Sun, <b>Qinghe Gu</b>*"
    type: "conference"
    venue: "CVPR 2026"
    year: 2026
    highlight: "Oral"
    image: "https://picsum.photos/seed/atlasbench/1200/800"
    abstract:
      zh: "我们提出了一个覆盖探索、检索、重规划与长期记忆管理的空间智能体评测基准，并给出统一的任务接口与可解释指标设计。"
      en: "We present a benchmark for spatial agents spanning exploration, retrieval, replanning, and long-term memory management, together with unified task interfaces and interpretable metrics."
    links:
      paper: "https://example.org/papers/atlasbench"
      code: "https://github.com/example-lab/atlasbench"
      project: "https://example.org/projects/atlasbench"

  - title:
      zh: "慢时间，快决策：拥挤室内服务机器人中的世界模型规划"
      en: "Slow Time, Sharp Decisions: World-Model Planning for Service Robots in Crowded Interior Environments"
    authors: "<b>Muchuan Li</b>, Yuchen Fang, <b>Lan Xu</b>, Marina Ortiz, Taro Sato, <b>Qinghe Gu</b>*"
    type: "conference"
    venue: "ICLR 2026"
    year: 2026
    highlight: ""
    abstract:
      zh: "论文讨论如何在有限感知预算下训练可复用世界模型，并将其用于高拥挤场景中的动作提案、冲突规避与任务恢复。"
      en: "This paper studies reusable world models trained under restricted perception budgets and shows how they support action proposals, conflict avoidance, and recovery in crowded service scenarios."
    links:
      paper: "https://example.org/papers/slow-time-sharp-decisions"
      code: "https://github.com/example-lab/slow-time-planner"

  - title:
      zh: "跨模态压缩作为协作智能体系统的中间表示"
