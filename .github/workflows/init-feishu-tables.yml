name: Init Feishu Tables

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '输入 INIT_FEISHU_TABLES 以确认初始化当前飞书多维表'
        required: true
        type: string

concurrency:
  group: init-feishu-tables
  cancel-in-progress: false

jobs:
  init-tables:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "INIT_FEISHU_TABLES" ]; then
            echo "Confirmation mismatch. Refusing to initialize Feishu tables."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Initialize Feishu tables
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
        run: |
          python scripts/init_feishu_table.py
