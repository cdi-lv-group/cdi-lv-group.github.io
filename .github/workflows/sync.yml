name: Feishu Data Auto-Sync

on:
  schedule:
    # 这里的 Cron 表达式代表每天凌晨 0 点（UTC 时间）执行
    # 如果你想每 6 小时同步一次，可以改为: "0 */6 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch: # 允许你在 GitHub 页面手动点击按钮触发同步

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予权限以便脚本能把更新后的数据推送到仓库

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Run Sync Script
        env:
          # 将刚才配置的 Secrets 注入到环境变量中
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          # 注意：请确保你的脚本路径正确
          python scripts/sync_all.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/ assets/images/
          # 只有当文件确实发生变化时才提交，防止 Action 报错
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync data from Feishu $(date +'%Y-%m-%d %H:%M')"
            git push
          fi