#     code: "https://github.com/cdi-lv-group/xxx"              # [选填] 代码开源链接 (如 GitHub)
#     project: "https://..."                                   # [选填] 项目官方主页链接
#     video: "https://youtube.com/..."                         # [选填] B站或 YouTube 讲解视频链接
