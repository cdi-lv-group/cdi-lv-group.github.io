    en: "SISTUS / College of Design and Innovation"
  icon: "🎓"
  theme: "blue"
  description: 
    zh: "提供全额奖学金。要求申请者具备扎实的数学基础与编程能力（PyTorch/C++），有顶会（CVPR/ICCV/NeurIPS等）发表经验者优先考虑。"
    en: "Full scholarships provided. Applicants should have solid math and programming skills (PyTorch/C++). Publications in top conferences (CVPR/ICCV/NeurIPS, etc.) are a strong plus."
