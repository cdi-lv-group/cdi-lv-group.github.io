# ==========================================
# LV课题组 招聘与招生数据库 (双语版)
# ==========================================
# 【字段说明指南】
# 1. title      (必填): 职位名称。嵌套 zh (中文) 和 en (英文)。
# 2. count      (必填): 招录人数或频率（如：1-2名/年）。
# 3. department (必填): 招录学院或依托单位。
# 4. icon       (必填): 展示图标（使用 Emoji）。
# 5. theme      (必填): 主题色，对应 Tailwind 颜色类（blue, cyan, green, indigo, orange）。
# 6. description(必填): 详细要求与福利，嵌套 zh 和 en。
# 7. tags       (选填): 核心关键词标签。若不填请保留空数组 []。
# 8. link       (选填): 具体的申请链接或详情页面，若无则设为 "#"。
# ==========================================

# ------------------------------------------
# [ 复制下方模版添加新职位 ]
# ------------------------------------------
# - title:
#     zh: "中文职位"
#     en: "English Title"
#   count:
#     zh: "人数"
#     en: "Count"
#   department:
#     zh: "所属学院"
#     en: "Department"
#   icon: "✨"
#   theme: "blue"
#   description:
#     zh: "中文描述..."
#     en: "English description..."
#   tags:           # <--- 选填，若不填请写 []
#     zh: ["标签1", "标签2"]
#     en: ["Tag1", "Tag2"]
#   link: "#"       # <--- 选填，默认 "#"
# ------------------------------------------

- title: 
