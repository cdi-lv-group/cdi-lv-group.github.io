# ==========================================
# LV课题组 成员数据字典 (双语多链接版)
# ==========================================
# 【维护说明】
# 1. 必填项 (Required): name, group_id, title
# 2. 选填项 (Optional): rank, role, avatar, bio, email, links, destination
# 3. 排序规则: 页面先按 group_id 分组，组内按 rank (从小到大) 排序
# 4. group_id 可选值 (必须精确): 
#    - professor (教授/副教授), assistant_prof (助教), researchers (研究员/博后)
#    - phd (博士), master (硕士), undergrad (本科), intern (实习生), alumni (校友)
# ==========================================

# --- 添加成员模版 (复制以下内容并填空) ---
# - name: { zh: "中文姓名", en: "English Name" }           # [必填]
#   group_id: "phd"                                       # [必填] 身份分类ID
#   rank: 10                                              # [选填] 排序权重，越小越靠前
#   title: { zh: "博士研究生", en: "Ph.D. Student" }       # [必填] 身份/年级描述
#   role: { zh: "核心骨干", en: "Core Member" }            # [选填] 实验室职务
#   avatar: "/assets/images/team/name.jpg"               # [选填] 头像路径，不填显示默认占位图
#   bio:                                                  # [选填] 个人简介
#     zh: "中文简介..."
#     en: "English bio..."
#   email: "xxx@tongji.edu.cn"                            # [选填] 邮箱
#   destination:                                          # [仅校友选填] 毕业去向
#     zh: "🎓 毕业去向：XX单位"
#     en: "🎓 Destination: XX Org"
#   links:                                                # [选填] 社交链接，不填不显示图标
#     homepage: "#"
#     scholar: "#"
#     github: "#"
#     linkedin: "#"
#     zhihu: "#"
# ----------------------------------------

