- icon: "👁️"
  # 配图路径，如果没有配图可以把这一行删掉或注释掉
  image: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=1000&auto=format&fit=crop"
  title:
    zh: "3D视觉与场景理解"
    en: "3D Vision and Scene Understanding"
  description:
    zh: "面向复杂、非结构化的真实世界，研究基于多源异构传感器（如雷达、视觉等）的大规模三维点云处理、语义分割与高精度场景重建技术。"
    en: "Focusing on complex, unstructured real-world environments, we research large-scale 3D point cloud processing, semantic segmentation, and high-precision scene reconstruction based on multi-source heterogeneous sensors (e.g., LiDAR, cameras)."
  points:
    zh:
      - "大规模点云场景的语义理解与实例分割"
      - "多源异构传感器的动态数据融合与自适应校准"
      - "基于神经辐射场 (NeRF) 与 3D Gaussian Splatting 的场景表征"
    en:
      - "Semantic understanding and instance segmentation of large-scale point clouds"
      - "Dynamic data fusion and adaptive calibration of heterogeneous sensors"
      - "Scene representation based on NeRF and 3D Gaussian Splatting"

- icon: "🧠"
  image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1000&auto=format&fit=crop"
  title:
    zh: "多模态感知与推理"
    en: "Multimodal Perception and Reasoning"
  description:
    zh: "探索视觉、语言、音频等多模态信息的对齐与融合机制。致力于构建具备常识推理与物理规律认知能力的基础大模型（Foundation Models）。"
    en: "Exploring the alignment and fusion mechanisms of multimodal information such as vision, language, and audio. We are dedicated to building foundation models equipped with commonsense reasoning and physical law cognition."
  points:
    zh:
      - "视觉-语言-动作 (Vision-Language-Action) 多模态大模型联合训练"
      - "开放词汇 (Open-Vocabulary) 下的通用目标检测与零样本识别"
      - "面向长视频与复杂物理交互的时空因果推理"
    en:
      - "Joint training of Vision-Language-Action (VLA) multimodal large models"
      - "General object detection and zero-shot recognition in Open-Vocabulary scenarios"
      - "Spatio-temporal causal reasoning for long videos and complex physical interactions"

- icon: "🦾"
  image: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=1000&auto=format&fit=crop"
  title:
    zh: "具身智能与智能交互"
    en: "Embodied AI and Intelligent Interaction"
  description:
    zh: "将感知模块与控制规划深度结合，研究机器人如何在复杂动态环境中进行自主决策、灵巧操作与人机协同交互 (HRI)。"
    en: "Deeply integrating perception modules with control and planning to research how robots make autonomous decisions, perform dexterous manipulation, and engage in human-robot interaction (HRI) in complex dynamic environments."
  points:
    zh:
      - "基于强化学习 (RL) 与模仿学习的机器人端到端控制"
      - "复杂物理环境下的机器狗/机械臂灵巧操作"
      - "生成式交互 (Generative Interaction) 与人机意图对齐"
    en:
      - "End-to-end robot control based on Reinforcement Learning (RL) and Imitation Learning"
      - "Dexterous manipulation of quadruped robots and robotic arms in complex physical environments"
      - "Generative interaction and human-robot intention alignment"