# ==========================================
# LV课题组 核心研究方向数据库
# 文件路径: _data/research.yml
# ==========================================

- title: "3D视觉与多模态感知"
  icon: "👁️" # 可以使用 Emoji，它会被渲染成左上角图标和巨型背景水印
  description: "面向复杂、非结构化的真实世界，研究基于多源传感器（RGB、LiDAR、Depth）的数据融合与理解。致力于在动态环境中实现高精度的物体检测、跟踪与大规模场景重建。"
  # image: "/assets/images/research-1.jpg" # 如果有配图，取消这行注释并填入路径即可
  points:
    - "大规模点云场景的语义理解与三维重建"
    - "多源异构传感器的数据融合与自适应校准"
    - "开放词汇 (Open-Vocabulary) 下的 3D 目标检测与分割"
    - "基于多模态大模型 (MLLM) 的视觉特征对齐"

- title: "具身智能与视觉运动控制"
  icon: "🤖"
  description: "探索智能体（如机械臂、四足机器人、无人机）在物理世界中的通用操作与导航能力。通过将视觉感知与底层运动控制深度结合，赋予智能体在长视野任务下的自主决策与闭环执行能力。"
  points:
    - "基于强化学习 (RL) 的复杂视觉运动策略 (Visuomotor Policy)"
    - "面向未知环境的自主探索与长视野任务规划 (Long-horizon Planning)"
    - "Sim-to-Real 零样本迁移与域适应控制"
    - "基于大语言模型驱动的具身智能体任务分解"

- title: "生成式交互与人机协同"
  icon: "✨"
  description: "结合生成式人工智能 (AIGC) 的最新进展，探索下一代人机交互范式。研究如何让智能系统更自然、更精准地理解人类意图，并在共融环境中实现安全、高效的人机智能协同协作。"
  points:
    - "基于扩散模型 (Diffusion) 的场景生成与数据增强"
    - "多模态指令理解与意图预测"
    - "人机共融环境下的安全约束与可解释性交互"
    - "以人为中心 (Human-Centric) 的智能自主行为评估体系"

# 如果你想加第四个方向，直接在这里复制上面的一块，改成你的内容即可！