# ==========================================
# Jekyll 网站全局配置 (双语增强版)
# ==========================================
title: "LV课题组 | LV Group"
description: "致力于多模态感知、推理与交互的共性基础研究。"
author: "Wenbin Zuo"
url: "https://cdi-lv-group.github.io"
baseurl: "" # 如果是个人/组织主页，建议留空

# 语言设置
lang: "zh" # 默认语言
languages: ["zh", "en"]
timezone: "Asia/Shanghai"

# 构建设置
markdown: kramdown

# 主题与外观设置
theme_settings:
  enable_dark_mode: true
  default_mode: "auto"

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 自定义变量 (支持双语调用)
lab:
  name: 
    zh: "CDI 实验室"
    en: "CDI Lab"
  group_short_name: "LV Group"
  group_full_name: "Lifelike Interaction and Visuomotor Perception Group"
  school: 
    zh: "同济大学"
    en: "Tongji University"
  institute: 
    zh: "设计创意学院 && 上海自主智能无人系统科学中心"
    en: "College of Design and Innovation && Shanghai Institute of Intelligent Science and Control"
  location: 
    zh: "上海市杨浦区四平路1239号"
    en: "1239 Siping Road, Yangpu District, Shanghai"
  email: "2511992@tongji.edu.cn"
  github: "https://github.com/cdi-lv-group"

