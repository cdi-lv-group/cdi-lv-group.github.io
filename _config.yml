# ==========================================
# 加入我们页面 Header 配置
# ==========================================
join_header:
  badge:
    zh: "加入 %NAME%"
    en: "Join %NAME%"
  title_main:
    zh: "与我们一起探索"
    en: "Exploring the"
  title_gradient:
    zh: "智能的物理边界"
    en: "Physical Boundaries"
  title_suffix:
    zh: ""
    en: "of AI"
  description:
    zh: "我们常年招收对 3D 视觉、多模态感知与具身智能充满热忱的优秀博士生、硕士生及科研实习生。如果你热爱硬核技术并渴望在顶级学术舞台发声，欢迎加入！"
    en: "We are constantly looking for talented Ph.D., Master students, and Research Interns passionate about 3D Vision, Multimodal Perception, and Embodied AI. If you love hardcore technology, join us!"
  eyebrow_notes:
    - zh: "机会、证明与申请路径"
      en: "Openings, proof, and application path"
    - zh: "从岗位到行动一页完成"
      en: "From roles to action in one page"
  facts:
    - label:
        zh: "岗位类型"
        en: "Role Types"
      value:
        zh: "博士、硕士、实习与访问研究"
        en: "Ph.D., Master, Intern, and Visiting roles"
    - label:
        zh: "申请节奏"
        en: "Application Flow"
      value:
        zh: "机会浏览 -> 价值确认 -> 立即投递"
        en: "Browse roles, verify fit, and apply"
    - label:
        zh: "团队风格"
        en: "Team Character"
      value:
        zh: "硬核研究与系统落地并重"
        en: "Rigorous research with systems execution"

join_process:
  steps:
    - title:
        zh: "准备你的研究快照"
        en: "Prepare Your Research Snapshot"
      description:
        zh: "用一页简历、成绩单和 1-2 个最能代表你的项目，快速说明你做过什么、会什么、接下来想探索什么。"
        en: "Prepare a CV, transcript, and one or two representative projects so we can quickly understand what you have built, what you know, and what you want to explore next."
    - title:
        zh: "写一封有判断力的邮件"
        en: "Write an Email with Clear Intent"
      description:
        zh: "不要只说“想加入”。请直接说明你感兴趣的研究方向、希望投入的时间周期，以及为什么这个方向和你的背景匹配。"
        en: "Do more than say you want to join. Explain the research direction you care about, your expected availability, and why your background fits that theme."
    - title:
        zh: "把兴趣落到可执行合作"
        en: "Turn Interest into Executable Collaboration"
      description:
        zh: "如果进入后续沟通，我们通常会围绕论文阅读、已有系统、实验实现或原型任务继续判断匹配度。"
        en: "If we continue the conversation, we usually assess fit through paper reading, existing systems, implementation tasks, or lightweight prototypes."
  subject_label:
    zh: "邮件主题建议"
    en: "Suggested Subject"
  subject_value:
    zh: "[申请博士/硕士/实习] - 姓名 - 本科学校 - 入学年份"
    en: "[Apply-PhD/Master/Intern] - Name - Univ - Year"
  contact_label:
    zh: "联系窗口"
    en: "Contact Window"
  contact_value:
    zh: "发送至实验室邮箱，并附上简历、成绩单和代表项目。"
    en: "Send your message to the lab mailbox with your CV, transcript, and representative projects attached."
  response_label:
    zh: "沟通方式"
    en: "Conversation Flow"
  response_value:
    zh: "如果方向契合，我们会继续约时间沟通研究兴趣、项目经验和投入安排。"
    en: "If the direction is a good match, we will follow up to discuss your research interests, project experience, and timeline."

